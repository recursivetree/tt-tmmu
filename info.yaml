# Tiny Tapeout project information
project:
  title:        "Tiny MMU"                            # Project title
  author:       "Yuri Honegger"                       # Your name
  discord:      "recursive_tree"                      # Your discord username, for communication and automatically assigning you a Tapeout role (optional)
  description:  "A TLB for an MMU for a TTL logic chip cpu" # One line description of what your project does
  language:     "SystemVerilog"                       # other examples include SystemVerilog, Amaranth, VHDL, etc
  clock_hz:     50000000       # Clock frequency in Hz (or 0 if not applicable)

  # How many tiles your design occupies? A single tile is about 167x108 uM.
  tiles: "1x2"          # Valid values: 1x1, 1x2, 2x2, 3x2, 4x2, 6x2 or 8x2

  # Your top module name must start with "tt_um_". Make it unique by including your github username:
  top_module:  "tt_um_recursivetree_tmmu_top"

  # List your project's source files here.
  # Source files must be in ./src and you must list each source file separately, one per line.
  # Don't forget to also update `PROJECT_SOURCES` in test/Makefile.
  source_files:
    - "project.sv"
    - "latch_tlb.sv"

# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
# This section is for the datasheet/website. Use descriptive names (e.g., RX, TX, MOSI, SCL, SEG_A, etc.).
pinout:
  # Inputs
  ui[0]: "vaddr0"
  ui[1]: "vaddr1"
  ui[2]: "vaddr2"
  ui[3]: "vaddr3"
  ui[4]: "vaddr4"
  ui[5]: "vaddr5"
  ui[6]: "vaddr6"
  ui[7]: "vaddr7"

  # Outputs
  uo[0]: "paddr0"
  uo[1]: "paddr1"
  uo[2]: "paddr2"
  uo[3]: "paddr3"
  uo[4]: "paddr4"
  uo[5]: "paddr5"
  uo[6]: "paddr6"
  uo[7]: "paddr7"

  # Bidirectional pins
  uio[0]: "write_en"
  uio[1]: "read_valid"
  uio[2]: "tlb_hit"
  uio[3]: "d1in"
  uio[4]: "d1out"
  uio[5]: "d2in"
  uio[6]: "d2out"
  uio[7]: ""

# Do not change!
yaml_version: 6
